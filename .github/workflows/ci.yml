name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run focused unit tests
        run: >-
          npx jest
          src/wallet/wallets.service.spec.ts
          src/wallet/wallets.controller.spec.ts
          src/currencies/currencies.service.spec.ts
          src/currencies/currencies.controller.spec.ts
          src/transactions/transaction-limit.service.spec.ts
          --runInBand

      - name: Collect focused coverage
        run: >-
          npx jest
          src/wallet/wallets.service.spec.ts
          src/wallet/wallets.controller.spec.ts
          src/currencies/currencies.service.spec.ts
          src/currencies/currencies.controller.spec.ts
          src/transactions/transaction-limit.service.spec.ts
          --coverage
          --runInBand
          --collectCoverageFrom='wallet/**/*.ts'
          --collectCoverageFrom='currencies/**/*.ts'
          --collectCoverageFrom='transactions/**/*.ts'
          --collectCoverageFrom='src/wallet/**/*.ts'
          --collectCoverageFrom='src/currencies/**/*.ts'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run integration tests
        run: npx jest test/wallets-currencies.e2e-spec.ts --runInBand --config ./test/jest-e2e.json
  role-sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check README roles match UserRole enum
        run: |
          README_ROLES=$(grep -oP '(?<=<!-- roles: ).*(?= -->)' README.md | tr ',' '\n' | tr -d ' ' | sort)
          ENUM_ROLES=$(awk '/export enum UserRole/,/^}/' src/users/user.entity.ts | grep -oP '^\s+\K[A-Z_]+(?=\s*=)' | sort)
          echo "README roles:"; echo "$README_ROLES"
          echo "Enum roles:";   echo "$ENUM_ROLES"
          if [ "$README_ROLES" != "$ENUM_ROLES" ]; then
            echo "ERROR: README role list does not match UserRole enum."
            echo "Update the <!-- roles: --> comment in README.md to match the enum."
            exit 1
          fi
          echo "Role sync check passed."
