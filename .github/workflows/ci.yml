name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run focused unit tests
        run: >-
          npx jest
          src/wallet/wallets.service.spec.ts
          src/wallet/wallets.controller.spec.ts
          src/currencies/currencies.service.spec.ts
          src/currencies/currencies.controller.spec.ts
          --runInBand

      - name: Collect focused coverage
        run: >-
          npx jest
          src/wallet/wallets.service.spec.ts
          src/wallet/wallets.controller.spec.ts
          src/currencies/currencies.service.spec.ts
          src/currencies/currencies.controller.spec.ts
          --coverage
          --runInBand
          --collectCoverageFrom='src/wallet/**/*.ts'
          --collectCoverageFrom='src/currencies/**/*.ts'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run integration tests
        run: npx jest test/wallets-currencies.e2e-spec.ts --runInBand --config ./test/jest-e2e.json
